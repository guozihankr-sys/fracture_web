<!DOCTYPE html>
<html>
<head>
    <title>AI骨折检测系统</title>
</head>
<body>
    <h2>AI骨折检测系统</h2>

    <form method="post" enctype="multipart/form-data">
        <input type="file" name="file">
        <button type="submit">上传并分析</button>
    </form>

    {% if result %}
        <h3>{{ result }} (概率: {{ prob }})</h3>
        <img src="{{ img_path }}" width="300">
    {% endif %}
</body>
</html>
