<!DOCTYPE html>
<html>
<head>
    <title>AI骨折检测系统</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 40px;
        }
        img {
            max-width: 300px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>🦴 AI骨折检测系统</h2>

<form method="post" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">上传并分析</button>
</form>

{% if result %}
    <h3>{{ result }}（概率: {{ prob }}）</h3>

    {% if img_path %}
        <img src="{{ img_path }}">
    {% endif %}
{% endif %}

</body>
</html>
